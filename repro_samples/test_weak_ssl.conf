# Test File: Weak SSL Protocols
# Legacy protocols like SSLv2, SSLv3, and TLSv1.0 are vulnerable to attacks like POODLE.

<VirtualHost *:443>
    SSLEngine on
    SSLCertificateFile "/path/to/cert"
    SSLCertificateKeyFile "/path/to/key"

    # VULNERABILITY: Enabling vulnerable legacy protocols
    SSLProtocol all -SSLv2 -SSLv3 TLSv1 TLSv1.1

    # FIX: SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1 (Only TLSv1.2 and v1.3)
</VirtualHost>
