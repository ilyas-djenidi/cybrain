
# Deprecated directives in Apache 2.4 (without mod_access_compat)
<Directory "/var/www/html/protected">
    Order allow,deny
    Allow from all
</Directory>

# Mixing 2.2 and 2.4 directives
<Directory "/var/www/html/mixed">
    Order allow,deny
    Allow from all
    Require all granted
</Directory>
